apiVersion: apps/v1
kind: Deployment
metadata:
  name: atelier-app
  labels:
    app: atelier-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: atelier-app
  template:
    metadata:
      labels:
        app: atelier-app
    spec:
      containers:
        - name: app
          image: atelier-kubernetes:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: atelier-app-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: atelier-app-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: app-config
              mountPath: /app/config/config.json
              subPath: config.json
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: app-config
          configMap:
            name: atelier-app-config
            items:
              - key: config.json
                path: config.json
